name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build & publish macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      - name: Build the .app
        working-directory: frontend
        run: |
          npm ci
          npm run tauri build
      - name: Zip the bundle
        working-directory: frontend/src-tauri/target/release/bundle/macos
        run: ditto -c -k --keepParent collajit.app collajit-macos.zip
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/src-tauri/target/release/bundle/macos/collajit-macos.zip
