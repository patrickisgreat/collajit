name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Qt offscreen system libs (for the PySide6 UI smoke tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon0 libfontconfig1 libfreetype6
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest (with coverage floor)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --cov=collajit --cov-report=term-missing --cov-fail-under=75

  frontend:
    name: Frontend — typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Unit tests (Vitest)
        run: npm test
      - name: Type-check & build
        run: npm run build

  tauri:
    name: Tauri desktop build (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      - run: npm ci
      - name: Build the .app
        run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: collajit-macos-app
          path: frontend/src-tauri/target/release/bundle/macos/collajit.app
          if-no-files-found: error
